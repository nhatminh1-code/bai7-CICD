# GitHub Actions Workflow equivalent to GitLab CI/CD

name: CI/CD Pipeline

# Trigger on push to main/master branch
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Environment variables
env:
  PROJECT_NAME: "BaiTap7-CICD"

jobs:
  # ============================================
  # STAGE 1: BUILD
  # ============================================
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build process
        run: |
          echo "🔨 Starting build process..."
          echo "Project: $PROJECT_NAME"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "✅ Build completed successfully!"

  # ============================================
  # STAGE 2: TEST
  # ============================================
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build  # Runs after build job
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run tests
        run: |
          echo "🧪 Running tests..."
          echo "Checking if public directory exists..."
          test -d public && echo "✅ public/ directory found" || exit 1
          echo "Checking if index.html exists..."
          test -f public/index.html && echo "✅ index.html found" || exit 1
          echo "Checking if styles.css exists..."
          test -f public/styles.css && echo "✅ styles.css found" || exit 1
          echo "✅ All tests passed!"

  # ============================================
  # STAGE 3: DEPLOY (GitHub Pages)
  # ============================================
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test  # Runs after test job
    
    # Only deploy on push to main branch (not PRs)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    # Required permissions for GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Display deployment info
        run: |
          echo "🚀 Deploying to GitHub Pages..."
          echo "Run ID: ${{ github.run_id }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Deploy time: $(date)"
          ls -la public/
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Deployment completed
        run: echo "✅ Deployment completed!"
